<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplicación Visual: Filas y Columnas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
            user-select: none;
        }
        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }
        @keyframes popIn {
            to { transform: scale(1); }
        }
        .pulse-green {
            animation: pulseGreen 1.5s infinite;
        }
        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Encabezado y Controles de Modo -->
    <div class="w-full max-w-4xl bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col">
        
        <header class="bg-indigo-500 text-white p-4 text-center relative">
            <h1 class="text-3xl font-semibold mb-4">La Magia de Multiplicar ✨</h1>
            <div class="flex justify-center space-x-4">
                <button id="btnExplore" onclick="setMode('explore')" class="px-6 py-2 rounded-full bg-yellow-400 text-yellow-900 font-bold hover:bg-yellow-300 transition-colors shadow-md transform hover:scale-105 border-4 border-yellow-500">
                    Modo Explorador 🔍
                </button>
                <button id="btnChallenge" onclick="setMode('challenge')" class="px-6 py-2 rounded-full bg-indigo-400 text-white font-bold hover:bg-indigo-300 transition-colors shadow-md transform hover:scale-105 border-4 border-indigo-400">
                    Modo Reto 🏆
                </button>
            </div>
            <!-- Objeto cambiante -->
            <button onclick="changeEmoji()" class="absolute top-4 right-4 bg-white text-2xl p-2 rounded-full shadow-lg hover:scale-110 transition-transform" title="Cambiar figura">
                🔄 <span id="currentEmojiBtn">🍎</span>
            </button>
        </header>

        <!-- Mensaje de Reto -->
        <div id="challengeBox" class="hidden bg-green-100 text-green-800 text-center p-4 text-2xl font-bold border-b-4 border-green-200">
            ¡Construye <span id="targetR" class="text-blue-600">X</span> veces <span id="targetC" class="text-pink-600">Y</span>!
        </div>

        <div class="flex flex-col md:flex-row flex-1 p-6 gap-6 items-center justify-center">
            
            <!-- Controles de Filas (Izquierda) -->
            <div class="flex flex-col items-center bg-blue-50 p-4 rounded-2xl border-4 border-blue-200 w-32">
                <h2 class="text-xl text-blue-700 font-bold mb-2">Filas</h2>
                <button onclick="changeRows(1)" class="w-16 h-16 bg-blue-500 text-white text-4xl rounded-full shadow hover:bg-blue-400 active:scale-95 flex items-center justify-center font-bold pb-1 mb-2">+</button>
                <span id="rowCount" class="text-4xl font-bold text-blue-800 my-2">3</span>
                <button onclick="changeRows(-1)" class="w-16 h-16 bg-blue-200 text-blue-800 text-4xl rounded-full shadow hover:bg-blue-300 active:scale-95 flex items-center justify-center font-bold pb-1 mt-2">-</button>
            </div>

            <!-- Cuadrícula Central -->
            <div class="flex-1 flex justify-center items-center min-h-[300px] bg-gray-50 rounded-2xl border-4 border-dashed border-gray-200 p-4 relative">
                <!-- Grid Dinámico -->
                <div id="gridContainer" class="grid gap-2 md:gap-3 transition-all duration-300">
                    <!-- Los emojis se inyectan aquí -->
                </div>
                
                <!-- Mensaje de Éxito -->
                <div id="successMsg" class="hidden absolute inset-0 bg-white/90 flex-col items-center justify-center rounded-xl z-10">
                    <div class="text-6xl mb-4">🎉</div>
                    <h2 class="text-4xl text-green-600 font-bold mb-4 text-center">¡Excelente!</h2>
                    <button onclick="generateChallenge()" class="px-8 py-3 bg-green-500 text-white text-2xl font-bold rounded-full shadow-lg hover:bg-green-400 pulse-green">
                        Siguiente Reto ➡️
                    </button>
                </div>
            </div>

            <!-- Controles de Columnas (Derecha/Abajo) -->
            <div class="flex flex-col items-center bg-pink-50 p-4 rounded-2xl border-4 border-pink-200 w-32">
                <h2 class="text-xl text-pink-700 font-bold mb-2">Columnas</h2>
                <button onclick="changeCols(1)" class="w-16 h-16 bg-pink-500 text-white text-4xl rounded-full shadow hover:bg-pink-400 active:scale-95 flex items-center justify-center font-bold pb-1 mb-2">+</button>
                <span id="colCount" class="text-4xl font-bold text-pink-800 my-2">4</span>
                <button onclick="changeCols(-1)" class="w-16 h-16 bg-pink-200 text-pink-800 text-4xl rounded-full shadow hover:bg-pink-300 active:scale-95 flex items-center justify-center font-bold pb-1 mt-2">-</button>
            </div>
        </div>

        <!-- Panel de Ecuación (Traducción Semántica) -->
        <div class="bg-gray-100 p-6 text-center rounded-b-3xl">
            <div class="text-2xl text-gray-600 mb-2 font-medium" id="semanticText">
                <span class="text-blue-600 font-bold" id="txtRows">3</span> filas de 
                <span class="text-pink-600 font-bold" id="txtCols">4</span>
            </div>
            <div class="text-3xl text-gray-700 mb-4 font-semibold" id="vecesText">
                <span class="text-blue-600 font-bold" id="txtRowsVeces">3</span> veces 
                <span class="text-pink-600 font-bold" id="txtColsVeces">4</span>
            </div>
            <div class="text-5xl md:text-6xl text-gray-800 font-bold flex items-center justify-center gap-4 bg-white py-4 px-8 rounded-2xl shadow-inner inline-flex border-2 border-gray-200">
                <span class="text-blue-600" id="eqRows">3</span>
                <span class="text-gray-400 text-4xl">×</span>
                <span class="text-pink-600" id="eqCols">4</span>
                <span class="text-gray-400 text-4xl">=</span>
                <span class="text-indigo-600 bg-indigo-100 px-4 py-1 rounded-xl" id="eqTotal">12</span>
            </div>
        </div>
    </div>

    <script>
        // Estado de la aplicación
        let rows = 3;
        let cols = 4;
        const maxLimit = 10;
        const minLimit = 1;
        let mode = 'explore'; // 'explore' o 'challenge'
        
        let targetRows = 0;
        let targetCols = 0;

        // Emojis amigables
        const emojis = ['🍎', '⭐', '🚗', '🐶', '🍕', '⚽', '🚀', '🎈', '🧩', '🍩'];
        let currentEmojiIndex = 0;

        // Elementos del DOM
        const gridContainer = document.getElementById('gridContainer');
        const rowCountEl = document.getElementById('rowCount');
        const colCountEl = document.getElementById('colCount');
        
        // Elementos de texto
        const txtRows = document.getElementById('txtRows');
        const txtCols = document.getElementById('txtCols');
        const txtRowsVeces = document.getElementById('txtRowsVeces');
        const txtColsVeces = document.getElementById('txtColsVeces');
        const eqRows = document.getElementById('eqRows');
        const eqCols = document.getElementById('eqCols');
        const eqTotal = document.getElementById('eqTotal');
        
        // Reto
        const challengeBox = document.getElementById('challengeBox');
        const targetREl = document.getElementById('targetR');
        const targetCEl = document.getElementById('targetC');
        const successMsg = document.getElementById('successMsg');

        // Botones de modo
        const btnExplore = document.getElementById('btnExplore');
        const btnChallenge = document.getElementById('btnChallenge');

        function init() {
            renderGrid();
            updateText();
        }

        function changeRows(delta) {
            let newRows = rows + delta;
            if (newRows >= minLimit && newRows <= maxLimit) {
                rows = newRows;
                renderGrid();
                updateText();
                checkWin();
            }
        }

        function changeCols(delta) {
            let newCols = cols + delta;
            if (newCols >= minLimit && newCols <= maxLimit) {
                cols = newCols;
                renderGrid();
                updateText();
                checkWin();
            }
        }

        function changeEmoji() {
            currentEmojiIndex = (currentEmojiIndex + 1) % emojis.length;
            document.getElementById('currentEmojiBtn').innerText = emojis[currentEmojiIndex];
            renderGrid();
        }

        function renderGrid() {
            // Limpiar cuadrícula
            gridContainer.innerHTML = '';
            
            // Configurar columnas de Tailwind
            gridContainer.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            
            // Ajustar tamaño del emoji basado en la cantidad para que quepan bien
            let emojiSize = 'text-4xl md:text-5xl';
            if (cols > 7 || rows > 7) emojiSize = 'text-3xl md:text-4xl';
            if (cols === 10 || rows === 10) emojiSize = 'text-2xl md:text-3xl';

            const total = rows * cols;
            let delay = 0;

            for (let i = 0; i < total; i++) {
                const item = document.createElement('div');
                item.className = `pop-in flex items-center justify-center bg-white rounded-xl shadow-sm border border-gray-100 w-12 h-12 md:w-16 md:h-16 ${emojiSize}`;
                item.innerText = emojis[currentEmojiIndex];
                
                // Efecto cascada visual
                item.style.animationDelay = `${delay}s`;
                delay += 0.01; 

                gridContainer.appendChild(item);
            }
        }

        function updateText() {
            rowCountEl.innerText = rows;
            colCountEl.innerText = cols;
            
            txtRows.innerText = rows;
            txtCols.innerText = cols;
            
            txtRowsVeces.innerText = rows;
            txtColsVeces.innerText = cols;
            
            eqRows.innerText = rows;
            eqCols.innerText = cols;
            eqTotal.innerText = rows * cols;
        }

        function setMode(newMode) {
            mode = newMode;
            successMsg.classList.add('hidden');
            
            if (mode === 'explore') {
                btnExplore.classList.add('border-yellow-500', 'bg-yellow-400', 'text-yellow-900');
                btnExplore.classList.remove('border-indigo-400', 'bg-indigo-400', 'text-white');
                
                btnChallenge.classList.remove('border-yellow-500', 'bg-yellow-400', 'text-yellow-900');
                btnChallenge.classList.add('border-indigo-400', 'bg-indigo-400', 'text-white');
                
                challengeBox.classList.add('hidden');
            } else {
                btnChallenge.classList.add('border-yellow-500', 'bg-yellow-400', 'text-yellow-900');
                btnChallenge.classList.remove('border-indigo-400', 'bg-indigo-400', 'text-white');
                
                btnExplore.classList.remove('border-yellow-500', 'bg-yellow-400', 'text-yellow-900');
                btnExplore.classList.add('border-indigo-400', 'bg-indigo-400', 'text-white');
                
                challengeBox.classList.remove('hidden');
                generateChallenge();
            }
        }

        function generateChallenge() {
            successMsg.classList.add('hidden');
            
            // Asegurar que el nuevo reto no sea igual al actual para que haya movimiento
            let newTR, newTC;
            do {
                // Generar retos entre 2 y 9 para no hacerlo tan básico ni al límite
                newTR = Math.floor(Math.random() * 8) + 2; 
                newTC = Math.floor(Math.random() * 8) + 2;
            } while (newTR === rows && newTC === cols);

            targetRows = newTR;
            targetCols = newTC;

            targetREl.innerText = targetRows;
            targetCEl.innerText = targetCols;

            // Restablecer el grid a un estado inicial aleatorio para obligar a interactuar
            rows = Math.floor(Math.random() * 5) + 1;
            cols = Math.floor(Math.random() * 5) + 1;
            
            renderGrid();
            updateText();
        }

        function checkWin() {
            if (mode === 'challenge') {
                if (rows === targetRows && cols === targetCols) {
                    setTimeout(() => {
                        successMsg.classList.remove('hidden');
                    }, 400); // Pequeño retraso para que vea cómo se arma
                }
            }
        }

        // Iniciar
        init();

    </script>
</body>
</html>
