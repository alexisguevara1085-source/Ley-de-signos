<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicios Ley de Signos</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
    }

    h1 {
        margin-top: 20px;
    }

    #ejercicio {
        font-size: 190px; /* Aproximadamente 5 cm */
        margin: 40px;
    }

    #respuesta {
        font-size: 80px;
        color: green;
        margin-top: 20px;
    }

    button {
        font-size: 25px;
        padding: 10px 20px;
        margin: 10px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>Práctica Ley de Signos</h1>

<div id="ejercicio">Presiona "Nuevo"</div>
<div id="respuesta"></div>

<button onclick="nuevoEjercicio()">Nuevo ejercicio</button>
<button onclick="mostrarRespuesta()">Mostrar respuesta</button>

<script>
let respuestaCorrecta = 0;

function numeroAleatorio() {
    return Math.floor(Math.random() * 20) - 10; // números entre -10 y 10
}

function nuevoEjercicio() {
    let tipo = Math.floor(Math.random() * 3);
    let a = numeroAleatorio();
    let b = numeroAleatorio();

    let ejercicioTexto = "";

    if (tipo === 0) {
        // SUMA O RESTA
        let operador = Math.random() < 0.5 ? "+" : "-";
        ejercicioTexto = `${a} ${operador} ${b}`;

        if (operador === "+") {
            respuestaCorrecta = a + b;
        } else {
            respuestaCorrecta = a - b;
        }

    } else if (tipo === 1) {
        // SIMPLIFICACIÓN DE SIGNOS
        let signo1 = Math.random() < 0.5 ? "+" : "-";
        let signo2 = Math.random() < 0.5 ? "+" : "-";

        ejercicioTexto = `(${signo1}${Math.abs(a)}) - (${signo2}${Math.abs(b)})`;

        let valorA = signo1 === "+" ? Math.abs(a) : -Math.abs(a);
        let valorB = signo2 === "+" ? Math.abs(b) : -Math.abs(b);

        respuestaCorrecta = valorA - valorB;

    } else {
        // MULTIPLICACIÓN
        ejercicioTexto = `${a} × ${b}`;
        respuestaCorrecta = a * b;
    }

    document.getElementById("ejercicio").innerText = ejercicioTexto;
    document.getElementById("respuesta").innerText = "";
}

function mostrarRespuesta() {
    document.getElementById("respuesta").innerText = respuestaCorrecta;
}
</script>

</body>
</html>
