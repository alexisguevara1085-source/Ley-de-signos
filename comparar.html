<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz: Comparar y Ordenar Números</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:20px;
width:1100px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

.seccion{
margin-top:25px;
border-top:2px solid #eee;
padding-top:20px;
}

/* REPRESENTACION 100 CUADRITOS */

.caja100{
width:140px;
height:140px;
display:grid;
grid-template-columns:repeat(10,1fr);
grid-template-rows:repeat(10,1fr);
gap:1px;
border:2px solid #333;
margin:auto;
}

.celda{
background:#eee;
}

.pintado{
background:#3498db;
}

.numeroGrande{
font-size:50px;
font-weight:bold;
text-align:center;
}

.filaNumeros{
display:flex;
justify-content:center;
gap:40px;
align-items:center;
}

.signoCaja{
width:60px;
height:60px;
border:3px solid black;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
}

.botonesSigno{
display:flex;
justify-content:center;
gap:20px;
margin-top:15px;
}

.btnSigno{
font-size:40px;
padding:10px 25px;
cursor:pointer;
border-radius:10px;
border:none;
background:#f1f1f1;
}

.btnSigno:hover{
background:#ddd;
}

/* ORDENAR */

.listaNumeros{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:15px;
font-size:35px;
font-weight:bold;
}

.casillasOrden{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.casilla{
width:70px;
height:60px;
border:3px solid #333;
font-size:30px;
text-align:center;
}

.teclado{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
justify-content:center;
}

.tecla{
background:#f1f1f1;
padding:15px;
font-size:20px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.resultado{
text-align:center;
font-size:20px;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Quiz de Números</h2>

<!-- PARTE 1 COMPARAR -->

<div class="seccion">

<h3>1️⃣ Comparar números</h3>

<div class="filaNumeros">

<div>
<div class="numeroGrande" id="numA"></div>
<div class="caja100" id="grafA"></div>
</div>

<div class="signoCaja" id="signoUsuario"></div>

<div>
<div class="numeroGrande" id="numB"></div>
<div class="caja100" id="grafB"></div>
</div>

</div>

<div class="botonesSigno">
<button class="btnSigno" onclick="ponerSigno('>')">></button>
<button class="btnSigno" onclick="ponerSigno('<')"><</button>
<button class="btnSigno" onclick="ponerSigno('=')">=</button>
</div>

<div class="resultado" id="resultadoComparar"></div>

</div>

<!-- PARTE 2 ORDENAR -->

<div class="seccion">

<h3>2️⃣ Ordenar números</h3>

<div id="tipoOrden" style="text-align:center;font-size:22px;"></div>

<div class="listaNumeros" id="listaNumeros"></div>

<div class="casillasOrden" id="casillasOrden"></div>

<div class="teclado">

<div class="tecla" onclick="agregarNum(1)">1</div>
<div class="tecla" onclick="agregarNum(2)">2</div>
<div class="tecla" onclick="agregarNum(3)">3</div>
<div class="tecla" onclick="agregarNum(4)">4</div>
<div class="tecla" onclick="agregarNum(5)">5</div>
<div class="tecla" onclick="agregarNum(6)">6</div>
<div class="tecla" onclick="agregarNum(7)">7</div>
<div class="tecla" onclick="agregarNum(8)">8</div>
<div class="tecla" onclick="agregarNum(9)">9</div>
<div class="tecla" onclick="borrar()">⌫</div>
<div class="tecla" onclick="agregarNum(0)">0</div>

</div>

<div class="resultado" id="resultadoOrden"></div>

</div>

</div>

<script>

/* GENERAR CUADRO 100 */

function dibujar100(num,id){

let cont=document.getElementById(id)
cont.innerHTML=""

for(let i=1;i<=100;i++){

let c=document.createElement("div")
c.className="celda"

if(i<=num) c.classList.add("pintado")

cont.appendChild(c)

}

}

/* COMPARAR */

let a,b

function nuevoComparar(){

let tipo=Math.random()

if(tipo<0.5){

a=Math.floor(Math.random()*11)
b=Math.floor(Math.random()*11)

}else{

a=Math.floor(Math.random()*100)
b=Math.floor(Math.random()*100)

}

document.getElementById("numA").textContent=a
document.getElementById("numB").textContent=b

dibujar100(a,"grafA")
dibujar100(b,"grafB")

document.getElementById("signoUsuario").textContent=""
document.getElementById("resultadoComparar").textContent=""

}

function ponerSigno(s){

document.getElementById("signoUsuario").textContent=s

let correcto

if(a>b) correcto=">"
else if(a<b) correcto="<"
else correcto="="

if(s==correcto){

document.getElementById("resultadoComparar").style.color="green"
document.getElementById("resultadoComparar").textContent="✔ Correcto"
setTimeout(nuevoComparar,1200)

}else{

document.getElementById("resultadoComparar").style.color="red"
document.getElementById("resultadoComparar").textContent="✘ Intenta otra vez"

}

}

/* ORDENAR */

let numeros=[]
let orden=""

function nuevoOrden(){

numeros=[]

let cantidad=3+Math.floor(Math.random()*3)

for(let i=0;i<cantidad;i++){

numeros.push(Math.floor(Math.random()*100))

}

orden=Math.random()<0.5?"asc":"desc"

document.getElementById("tipoOrden").textContent=
orden=="asc"?"Ordena de menor a mayor":"Ordena de mayor a menor"

document.getElementById("listaNumeros").textContent=numeros.join(" , ")

let cont=document.getElementById("casillasOrden")
cont.innerHTML=""

for(let i=0;i<cantidad;i++){

let input=document.createElement("input")
input.className="casilla"
cont.appendChild(input)

}

document.getElementById("resultadoOrden").textContent=""

}

/* TECLADO */

let activo=null

document.addEventListener("click",e=>{
if(e.target.classList.contains("casilla")) activo=e.target
})

function agregarNum(n){

if(!activo) return
activo.value+=n
verificarOrden()

}

function borrar(){

if(!activo) return
activo.value=activo.value.slice(0,-1)

}

/* VERIFICAR ORDEN */

function verificarOrden(){

let inputs=document.querySelectorAll(".casilla")

let valores=[]

inputs.forEach(i=>{
valores.push(parseInt(i.value))
})

if(valores.includes(NaN)) return

let copia=[...numeros]

if(orden=="asc") copia.sort((a,b)=>a-b)
else copia.sort((a,b)=>b-a)

if(JSON.stringify(valores)==JSON.stringify(copia)){

document.getElementById("resultadoOrden").style.color="green"
document.getElementById("resultadoOrden").textContent="✔ Correcto"

setTimeout(nuevoOrden,1500)

}

}

/* INICIAR */

nuevoComparar()
nuevoOrden()

</script>

</body>
</html>
