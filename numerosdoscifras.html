<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Números - Base 10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
        }

        /* Animación para cuando aparece un nuevo número */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Estilos de los bloques Base 10 */
        .ten-bar {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background-color: #1e3a8a; /* Borde oscuro */
            padding: 2px;
            border-radius: 4px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }

        .ten-segment {
            width: 30px;
            height: 30px;
            background-color: #3b82f6; /* Azul claro */
            border-radius: 2px;
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.1);
        }

        .one-cube {
            width: 30px;
            height: 30px;
            background-color: #ef4444; /* Rojo */
            border: 2px solid #991b1b;
            border-radius: 4px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1), inset -2px -2px 0px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Encabezado -->
    <header class="text-center mb-8 bg-white p-6 rounded-3xl shadow-xl border-4 border-blue-200 max-w-3xl w-full">
        <h1 class="text-4xl md:text-5xl font-bold text-blue-600 mb-2">¡Descubre el Número!</h1>
        <p class="text-gray-600 text-lg">Mira los bloques y di el número en voz alta.</p>
    </header>

    <!-- Controles -->
    <div class="bg-white p-6 rounded-3xl shadow-lg border-2 border-gray-100 max-w-3xl w-full flex flex-col items-center gap-6 z-10">
        
        <!-- Selección de Modo -->
        <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
            <button id="btn-mode-tens" onclick="setMode('tens')" class="flex-1 py-3 px-6 rounded-2xl font-bold text-lg transition-all transform hover:-translate-y-1 bg-blue-500 text-white shadow-[0_6px_0_#2563eb]">
                De 10 en 10
            </button>
            <button id="btn-mode-random" onclick="setMode('random')" class="flex-1 py-3 px-6 rounded-2xl font-bold text-lg transition-all transform hover:-translate-y-1 bg-gray-200 text-gray-700 shadow-[0_6px_0_#d1d5db]">
                Cualquier Número
            </button>
        </div>

        <!-- Botón Generar -->
        <button onclick="generateNumber()" class="w-full sm:w-auto py-4 px-10 rounded-full font-bold text-2xl text-white bg-green-500 hover:bg-green-400 transition-all transform hover:scale-105 active:scale-95 shadow-[0_8px_0_#16a34a] mt-2">
            🎲 Generar Nuevo Número
        </button>
    </div>

    <!-- Área de Visualización -->
    <main class="mt-12 bg-white p-8 rounded-3xl shadow-2xl border-4 border-yellow-300 max-w-4xl w-full flex flex-col items-center min-h-[500px]">
        
        <!-- Número en texto -->
        <div id="number-display" class="text-8xl md:text-9xl font-bold text-gray-800 mb-10 h-32 flex items-center justify-center">
            --
        </div>

        <!-- Contenedor de Bloques -->
        <div id="blocks-container" class="flex flex-wrap justify-center gap-10 w-full items-end min-h-[350px] p-4 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300">
            
            <!-- Aquí van las decenas (barritas azules) -->
            <div id="tens-container" class="flex gap-2 items-end">
                <!-- Generado por JS -->
            </div>

            <!-- Aquí van las unidades (cuadritos rojos) -->
            <div id="ones-container" class="grid grid-cols-2 sm:grid-cols-5 gap-2 content-end">
                <!-- Generado por JS -->
            </div>

        </div>
    </main>

    <script>
        let currentMode = 'tens'; // Modos: 'tens' o 'random'
        let currentNumber = 0;

        // Función para cambiar de modo
        function setMode(mode) {
            currentMode = mode;
            
            const btnTens = document.getElementById('btn-mode-tens');
            const btnRandom = document.getElementById('btn-mode-random');

            // Actualizar estilos de los botones
            if (mode === 'tens') {
                btnTens.className = "flex-1 py-3 px-6 rounded-2xl font-bold text-lg transition-all transform hover:-translate-y-1 bg-blue-500 text-white shadow-[0_6px_0_#2563eb]";
                btnRandom.className = "flex-1 py-3 px-6 rounded-2xl font-bold text-lg transition-all transform hover:-translate-y-1 bg-gray-200 text-gray-700 shadow-[0_6px_0_#d1d5db]";
            } else {
                btnRandom.className = "flex-1 py-3 px-6 rounded-2xl font-bold text-lg transition-all transform hover:-translate-y-1 bg-purple-500 text-white shadow-[0_6px_0_#9333ea]";
                btnTens.className = "flex-1 py-3 px-6 rounded-2xl font-bold text-lg transition-all transform hover:-translate-y-1 bg-gray-200 text-gray-700 shadow-[0_6px_0_#d1d5db]";
            }

            // Generar un número inmediatamente al cambiar de modo
            generateNumber();
        }

        // Función para generar un número aleatorio según el modo
        function generateNumber() {
            let newNumber;
            
            if (currentMode === 'tens') {
                // Generar potencias de 10 (10, 20, 30... 90)
                // Evitar repetir el mismo número seguido
                do {
                    newNumber = Math.floor(Math.random() * 9 + 1) * 10;
                } while (newNumber === currentNumber);
            } else {
                // Generar cualquier número de dos cifras (11 al 99, excluyendo decenas puras si se desea, 
                // pero dejaremos que puedan salir todos para que sea realmente aleatorio)
                do {
                    newNumber = Math.floor(Math.random() * 89) + 11; 
                } while (newNumber === currentNumber);
            }

            currentNumber = newNumber;
            updateDisplay();
        }

        // Función para actualizar la pantalla (número y bloques)
        function updateDisplay() {
            const numDisplay = document.getElementById('number-display');
            const tensContainer = document.getElementById('tens-container');
            const onesContainer = document.getElementById('ones-container');

            // Reiniciar animaciones
            numDisplay.classList.remove('animate-pop');
            tensContainer.classList.remove('animate-pop');
            onesContainer.classList.remove('animate-pop');

            // Forzar reflujo para reiniciar la animación
            void numDisplay.offsetWidth;

            // Mostrar el número
            numDisplay.textContent = currentNumber;
            numDisplay.classList.add('animate-pop');

            // Limpiar contenedores
            tensContainer.innerHTML = '';
            onesContainer.innerHTML = '';

            // Calcular decenas y unidades
            const tens = Math.floor(currentNumber / 10);
            const ones = currentNumber % 10;

            // Dibujar Barritas de Decenas (Azules)
            for (let i = 0; i < tens; i++) {
                const bar = document.createElement('div');
                bar.className = 'ten-bar';
                
                // Añadir 10 segmentos a la barrita para que parezca un bloque base 10 real
                for (let j = 0; j < 10; j++) {
                    const segment = document.createElement('div');
                    segment.className = 'ten-segment';
                    bar.appendChild(segment);
                }
                tensContainer.appendChild(bar);
            }

            // Dibujar Cuadritos de Unidades (Rojos)
            for (let i = 0; i < ones; i++) {
                const cube = document.createElement('div');
                cube.className = 'one-cube';
                onesContainer.appendChild(cube);
            }

            // Añadir animación a los bloques
            tensContainer.classList.add('animate-pop');
            if (ones > 0) onesContainer.classList.add('animate-pop');
        }

        // Generar el primer número al cargar la página
        window.onload = () => {
            generateNumber();
        };
    </script>
</body>
</html>
